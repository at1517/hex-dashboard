<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HEX车间 · 月度良品率驾驶舱</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js">
  </script>
  <style>
    :root {
      --bg-primary: #0a0e27;
      --bg-secondary: #0f1535;
      --bg-card: #111832;
      --border-color: #1e2d4a;
      --text-primary: #e8ecf4;
      --text-secondary: #7a8599;
      --accent-blue: #3b82f6;
      --accent-cyan: #06b6d4;
      --accent-green: #10b981;
      --accent-yellow: #f59e0b;
      --accent-red: #ef4444;
      --accent-purple: #8b5cf6;
      --glow-cyan: rgba(6, 182, 212, 0.25);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      padding: 12px;
    }

    .dashboard {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: linear-gradient(180deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
      position: relative;
    }

    /* 动态背景流光 */
    .dashboard::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at 30% 20%, rgba(6, 182, 212, 0.03) 0%, transparent 50%),
        radial-gradient(ellipse at 70% 80%, rgba(59, 130, 246, 0.03) 0%, transparent 50%);
      animation: bgPulse 8s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes bgPulse {
      0% {
        opacity: 0.5;
        transform: scale(1) rotate(0deg);
      }
      100% {
        opacity: 1;
        transform: scale(1.1) rotate(3deg);
      }
    }

    .dashboard>* {
      position: relative;
      z-index: 1;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 24px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      position: relative;
      flex-shrink: 0;
      height: 64px;
      overflow: hidden;
    }
    .header::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent-cyan), var(--accent-blue), transparent);
      animation: headerGlow 3s ease-in-out infinite;
      background-size: 200% 100%;
    }
    @keyframes headerGlow {
      0%,
      100% {
        background-position: -200% 0;
      }
      50% {
        background-position: 200% 0;
      }
    }

    .header-title h1 {
      font-size: clamp(20px, 2.2vw, 30px);
      font-weight: 600;
      background: linear-gradient(90deg, var(--accent-cyan), var(--accent-blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 3px;
      animation: titlePulse 4s ease-in-out infinite;
    }
    @keyframes titlePulse {
      0%,
      100% {
        filter: brightness(1);
      }
      50% {
        filter: brightness(1.2);
      }
    }

    .header-stats {
      display: flex;
      gap: clamp(20px, 2.5vw, 40px);
      align-items: center;
    }
    .stat-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .stat-label {
      font-size: 11px;
      color: var(--text-secondary);
      letter-spacing: 0.5px;
    }
    .stat-value {
      font-size: clamp(18px, 1.8vw, 26px);
      font-weight: 700;
      font-feature-settings: "tnum";
      transition: all 0.3s;
    }
    .stat-value.blue {
      color: var(--accent-blue);
    }
    .stat-value.green {
      color: var(--accent-green);
    }
    .stat-value.red {
      color: var(--accent-red);
    }
    .stat-value.cyan {
      color: var(--accent-cyan);
    }
    .stat-value.pulse {
      animation: valuePulse 2s ease-in-out infinite;
    }
    @keyframes valuePulse {
      0%,
      100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.04);
      }
    }

    .datetime {
      font-size: clamp(12px, 1vw, 15px);
      color: var(--text-secondary);
      min-width: 160px;
      text-align: right;
      font-variant-numeric: tabular-nums;
      animation: timeGlow 4s ease-in-out infinite;
    }
    @keyframes timeGlow {
      0%,
      100% {
        opacity: 0.8;
      }
      50% {
        opacity: 1;
      }
    }

    /* Main Grid */
    .row-main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1.6fr 1fr;
      gap: 10px;
      min-height: 0;
    }
    .row-bottom {
      flex: 0.8;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      min-height: 0;
    }

    /* Panel */
    .panel {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      transition: border-color 0.4s ease, box-shadow 0.4s ease;
    }
    .panel:hover {
      border-color: rgba(6, 182, 212, 0.3);
      box-shadow: 0 0 30px rgba(6, 182, 212, 0.05);
    }

    /* 面板流光边框 - 动态 */
    .panel::after {
      content: '';
      position: absolute;
      top: -1px;
      left: -1px;
      right: -1px;
      bottom: -1px;
      border-radius: 8px;
      background: linear-gradient(135deg, transparent 40%, rgba(6, 182, 212, 0.06), transparent 60%);
      background-size: 300% 300%;
      animation: borderFlow 6s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes borderFlow {
      0% {
        background-position: 0% 0%;
      }
      50% {
        background-position: 100% 100%;
      }
      100% {
        background-position: 0% 0%;
      }
    }
    .panel>* {
      position: relative;
      z-index: 1;
    }

    .panel-header {
      padding: 6px 14px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .panel-header::before {
      content: '';
      width: 3px;
      height: 14px;
      background: linear-gradient(180deg, var(--accent-cyan), var(--accent-blue));
      border-radius: 2px;
      animation: headerBarPulse 2s ease-in-out infinite;
    }
    @keyframes headerBarPulse {
      0%,
      100% {
        opacity: 1;
      }
      50% {
        opacity: 0.4;
      }
    }
    .panel-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .panel-body {
      flex: 1;
      padding: 8px;
      overflow: hidden;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    .chart-container {
      position: relative;
      width: 100%;
      height: 100%;
    }

    /* Tables with auto-scroll */
    .table-wrap {
      flex: 1;
      overflow: hidden;
      position: relative;
      mask-image: linear-gradient(to bottom, black 90%, transparent 100%);
      -webkit-mask-image: linear-gradient(to bottom, black 90%, transparent 100%);
    }
    .table-scroll {
      animation: scrollTable 18s linear infinite;
    }
    .table-scroll:hover {
      animation-play-state: paused;
    }
    @keyframes scrollTable {
      0% {
        transform: translateY(0);
      }
      100% {
        transform: translateY(-50%);
      }
    }

    table.data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    table.data-table thead th {
      background: rgba(59, 130, 246, 0.15);
      color: var(--accent-blue);
      font-weight: 600;
      padding: 6px 10px;
      text-align: left;
      border-bottom: 1px solid var(--border-color);
      position: sticky;
      top: 0;
      z-index: 2;
    }
    table.data-table tbody td {
      padding: 5px 10px;
      border-bottom: 1px solid rgba(30, 45, 74, 0.3);
      color: var(--text-primary);
      transition: background 0.2s;
    }
    table.data-table tbody tr {
      transition: background 0.2s;
    }
    table.data-table tbody tr:hover td {
      background: rgba(59, 130, 246, 0.08);
    }

    .tag {
      display: inline-block;
      padding: 1px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
    }
    .tag.green {
      background: rgba(16, 185, 129, 0.2);
      color: var(--accent-green);
    }
    .tag.red {
      background: rgba(239, 68, 68, 0.2);
      color: var(--accent-red);
    }
    .tag.orange {
      background: rgba(245, 158, 11, 0.2);
      color: var(--accent-yellow);
    }

    /* AI suggestions 动态 */
    .suggestion-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      flex: 1;
      overflow: hidden;
    }
    .suggestion-item {
      background: rgba(17, 24, 50, 0.5);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 11px;
      line-height: 1.5;
      color: var(--text-primary);
      overflow: hidden;
      transition: all 0.3s;
      position: relative;
    }
    .suggestion-item::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 2px;
      background: linear-gradient(180deg, var(--accent-cyan), var(--accent-purple));
      border-radius: 2px;
      animation: suggestionGlow 3s ease-in-out infinite;
    }
    @keyframes suggestionGlow {
      0%,
      100% {
        opacity: 0.5;
      }
      50% {
        opacity: 1;
      }
    }
    .suggestion-item:hover {
      border-color: rgba(6, 182, 212, 0.3);
      background: rgba(17, 24, 50, 0.8);
    }
    .suggestion-item strong {
      color: var(--accent-cyan);
    }

    /* scroll hint */
    .scroll-hint {
      font-size: 10px;
      color: var(--text-secondary);
      text-align: right;
      margin-top: 2px;
      animation: hintBlink 2s ease-in-out infinite;
    }
    @keyframes hintBlink {
      0%,
      100% {
        opacity: 0.5;
      }
      50% {
        opacity: 1;
      }
    }

    /* 右侧面板特殊布局 */
    .right-panel-body {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 4px 8px 8px 8px;
      height: 100%;
    }
    .right-table-wrap {
      flex: 0 0 auto;
      height: 110px;
      overflow: hidden;
      position: relative;
      mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
      -webkit-mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
    }
    .right-table-scroll {
      animation: scrollTable 14s linear infinite;
    }
    .right-table-scroll:hover {
      animation-play-state: paused;
    }

    .right-suggestion-wrap {
      flex: 1;
      overflow: hidden;
      min-height: 0;
      margin-top: 4px;
    }
    .right-suggestion-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      height: 100%;
    }
    .right-suggestion-item {
      background: rgba(17, 24, 50, 0.5);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 10px;
      line-height: 1.4;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      transition: all 0.3s;
    }
    .right-suggestion-item::before {
      content: '▸';
      color: var(--accent-cyan);
      margin-right: 4px;
      font-size: 12px;
    }
    .right-suggestion-item strong {
      color: var(--accent-cyan);
      margin-right: 3px;
    }

    /* 响应式 */
    @media (max-width: 1024px) {
      .row-main {
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto auto;
      }
      .row-main .panel:last-child {
        grid-column: span 2;
      }
      .row-bottom {
        grid-template-columns: 1fr 1fr;
      }
      .row-bottom .panel:last-child {
        grid-column: span 2;
      }
      .right-suggestion-grid {
        grid-template-columns: 1fr 1fr;
      }
    }
    @media (max-width: 768px) {
      .row-main,
      .row-bottom {
        grid-template-columns: 1fr;
      }
      .row-main .panel:last-child,
      .row-bottom .panel:last-child {
        grid-column: span 1;
      }
      .header {
        flex-wrap: wrap;
        height: auto;
        gap: 8px;
        padding: 10px 16px;
      }
      .header-stats {
        gap: 12px;
      }
      .right-suggestion-grid {
        grid-template-columns: 1fr;
      }
    }

    /* 滚动条美化 */
    ::-webkit-scrollbar {
      width: 3px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(30, 45, 74, 0.3);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--accent-cyan);
      border-radius: 3px;
    }

    /* 数字跳动动画 */
    .count-up {
      display: inline-block;
      transition: all 0.3s;
    }
  </style>
</head>
<body>
  <div class="dashboard">
    <!-- Header -->
    <div class="header">
      <div class="header-title"><h1>HEX车间 · 月度良品率驾驶舱</h1></div>
      <div class="header-stats">
        <div class="stat-item">
          <span class="stat-label">📆 7月累计不良</span>
          <span class="stat-value red pulse" id="kpiBad">--</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">📦 7月累计产量</span>
          <span class="stat-value blue pulse" id="kpiOutput">--</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">📊 7月良品率</span>
          <span class="stat-value green pulse" id="kpiYield">--</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">🎯 目标</span>
          <span class="stat-value cyan">97.5%</span>
        </div>
      </div>
      <div class="datetime" id="datetime"></div>
    </div>

    <!-- Row 2: 3 columns -->
    <div class="row-main">
      <!-- Left: 月度良品率趋势 -->
      <div class="panel">
        <div class="panel-header"><span class="panel-title">📈 月度良品率趋势 (1–7月)</span></div>
        <div class="panel-body"><div class="chart-container"><canvas id="trendChart"></canvas></div></div>
      </div>

      <!-- Center: 各产品月度良品率对比 -->
      <div class="panel">
        <div class="panel-header"><span class="panel-title">📊 各产品月度良品率对比</span></div>
        <div class="panel-body"><div class="chart-container"><canvas id="productTrendChart"></canvas></div></div>
      </div>

      <!-- Right: 7月各产品炉前良品率 -->
      <div class="panel">
        <div class="panel-header"><span class="panel-title">🏭 7月各产品良品率 (炉前)</span></div>
        <div class="panel-body"><div class="chart-container"><canvas id="julyProductChart"></canvas></div></div>
      </div>
    </div>

    <!-- Row 3: 3 columns -->
    <div class="row-bottom">
      <!-- Left: 工段不良分布 -->
      <div class="panel">
        <div class="panel-header"><span class="panel-title">🧩 7月不良 · 工段分布</span></div>
        <div class="panel-body"><div class="chart-container"><canvas id="stationChart"></canvas></div></div>
      </div>

      <!-- Center: TOP失效模式 -->
      <div class="panel">
        <div class="panel-header"><span class="panel-title">⚠️ TOP失效模式 (7月)</span></div>
        <div class="panel-body"><div class="chart-container"><canvas id="defectChart"></canvas></div></div>
      </div>

      <!-- Right: 数据明细 + AI建议整合 (带滚动) -->
      <div class="panel">
        <div class="panel-header"><span class="panel-title">📋 月度明细 & AI建议</span></div>
        <div class="panel-body right-panel-body">
          <!-- 月度明细 - 自动滚动 -->
          <div class="right-table-wrap">
            <div class="right-table-scroll">
              <table class="data-table" id="miniMonthlyTable">
                <thead><tr><th>月份</th><th>良品率</th><th>状态</th></tr></thead>
                <tbody id="miniMonthlyBody"></tbody>
                <!-- 复制一份用于无缝滚动 -->
                <tbody id="miniMonthlyBodyClone" style="display:none;"></tbody>
              </table>
            </div>
          </div>
          <div class="scroll-hint">⬇ 自动滚动 · 悬停暂停</div>

          <!-- AI建议 -->
          <div class="right-suggestion-wrap">
            <div class="right-suggestion-grid" id="suggestionGrid">
              <div class="right-suggestion-item"><strong>预检大漏</strong> 占比高，建议加强炉后视觉检测</div>
              <div class="right-suggestion-item"><strong>钎焊移位</strong> 需优化工装定位，降低掉带</div>
              <div class="right-suggestion-item"><strong>氦检虚焊</strong> 点焊参数复测，增加焊后全检</div>
              <div class="right-suggestion-item"><strong>炉前报废</strong> 来料尺寸一致性需与供应商沟通</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ================================================================
    // 1. 核心数据
    // ================================================================
    const monthly = {
      months: ['1月', '2月', '3月', '4月', '5月', '6月', '7月'],
      good: [599233, 242774, 661516, 544923, 658978, 631507, 165351],
      bad: [17019, 6758, 11691, 10786, 12047, 12231, 4380]
    };

    const prodGood = {
      'HTR': [113522, 41689, 107615, 94564, 102714, 109039, 26113],
      'In Cond': [137485, 47057, 179209, 109975, 116240, 137317, 32756],
      'Evap': [183979, 80204, 193006, 206898, 278452, 259238, 49562],
      'Cond': [71649, 38841, 67798, 41948, 47815, 59055, 26637],
      'RAD': [64518, 18543, 84188, 67148, 47115, 50208, 23204],
      'TOC': [28080, 16440, 29700, 24390, 22119, 16650, 7079]
    };

    const julyBadByProduct = {
      'HTR': 1558,
      'In Cond': 742,
      'Evap': 1363,
      'Cond': 1018,
      'RAD': 689,
      'TOC': 292
    };
    const prodNames = Object.keys(prodGood);
    const julyProd = {};
    for (const p of prodNames) {
      julyProd[p] = { good: prodGood[p][6], bad: julyBadByProduct[p] || 0 };
    }

    const stationBad = {
      '炉前': 1184,
      '点焊': 412,
      '钎焊': 1247,
      '预检': 891,
      '超声波': 316,
      '亲水湿度检': 134,
      '火焰焊长管': 278,
      '氦检': 698,
      '干检（总成）': 376
    };
    const defectBad = {
      '预检大漏/呛管': 891,
      '钎焊护板移位/间隙': 647,
      '氦检泄漏/虚焊': 698,
      '炉前呛管/报废': 1184,
      '点焊虚焊': 412,
      '超声波内漏': 316,
      '火焰焊虚焊/过烧': 278,
      '干检微漏/大漏': 376
    };

    // ================================================================
    // 2. 计算
    // ================================================================
    function calcYield(g, b) {
      if (g + b === 0) return 0;
      return g / (g + b);
    }
    const monthlyYield = monthly.months.map((_, i) => calcYield(monthly.good[i], monthly.bad[i]));
    const prodYield = {};
    for (const p of prodNames) {
      prodYield[p] = monthly.months.map((_, i) => {
        if (i === 6) return calcYield(julyProd[p].good, julyProd[p].bad);
        return monthlyYield[i];
      });
    }

    // ================================================================
    // 3. KPI 数字滚动动画
    // ================================================================
    function animateNumber(el, target, suffix = '', duration = 1200) {
      const start = 0;
      const startTime = performance.now();
      const isFloat = target % 1 !== 0;

      function update(currentTime) {
        const elapsed = currentTime - startTime;
        const progress = Math.min(elapsed / duration, 1);
        // easeOutQuart
        const eased = 1 - Math.pow(1 - progress, 4);
        const current = start + (target - start) * eased;
        if (isFloat) {
          el.textContent = current.toFixed(2) + '%';
        } else {
          el.textContent = Math.round(current).toLocaleString() + suffix;
        }
        if (progress < 1) {
          requestAnimationFrame(update);
        } else {
          if (isFloat) {
            el.textContent = target.toFixed(2) + '%';
          } else {
            el.textContent = target.toLocaleString() + suffix;
          }
        }
      }
      requestAnimationFrame(update);
    }

    const kpiBad = monthly.bad[6];
    const kpiOutput = monthly.good[6];
    const kpiYield = monthlyYield[6] * 100;

    const elBad = document.getElementById('kpiBad');
    const elOutput = document.getElementById('kpiOutput');
    const elYield = document.getElementById('kpiYield');

    // 初始显示0，然后动画
    elBad.textContent = '0';
    elOutput.textContent = '0';
    elYield.textContent = '0.00%';

    setTimeout(() => {
      animateNumber(elBad, kpiBad, '');
    }, 300);
    setTimeout(() => {
      animateNumber(elOutput, kpiOutput, '');
    }, 400);
    setTimeout(() => {
      animateNumber(elYield, kpiYield, '', 1500);
    }, 200);

    // ================================================================
    // 4. 时间
    // ================================================================
    function updateDateTime() {
      const now = new Date();
      const text = now.toLocaleString('zh-CN', {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false
      });
      document.getElementById('datetime').textContent = '🕒 ' + text;
    }
    setInterval(updateDateTime, 1000);
    updateDateTime();

    // ================================================================
    // 5. 图表渲染 (深色主题 + 动画)
    // ================================================================
    Chart.defaults.color = '#c8d0dc';
    Chart.defaults.borderColor = '#1a2540';

    // 通用动画配置
    const chartAnimations = {
      tension: {
        duration: 1000,
        easing: 'easeOutQuad'
      }
    };

    // 5.1 月度趋势
    const ctx1 = document.getElementById('trendChart').getContext('2d');
    const trendData = monthlyYield.map(v => +(v * 100).toFixed(2));
    new Chart(ctx1, {
      type: 'line',
      data: {
        labels: monthly.months,
        datasets: [{
          label: '良品率',
          data: trendData,
          borderColor: '#60a5fa',
          backgroundColor: 'rgba(96,165,250,0.08)',
          fill: true,
          tension: 0.25,
          pointBackgroundColor: '#60a5fa',
          pointBorderColor: '#0f1729',
          pointBorderWidth: 2,
          pointRadius: 4,
          pointHoverRadius: 7,
        }, {
          label: '目标 97.5%',
          data: monthly.months.map(() => 97.5),
          borderColor: '#f87171',
          borderDash: [6, 4],
          borderWidth: 2,
          pointRadius: 0,
          fill: false,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: {
          duration: 1200,
          easing: 'easeOutQuart'
        },
        plugins: {
          legend: { position: 'top', labels: { usePointStyle: true, boxWidth: 8, padding: 12, font: { size: 10 } } },
          tooltip: { callbacks: { label: (ctx) => ctx.dataset.label + ': ' + ctx.parsed.y + '%' } }
        },
        scales: {
          y: { min: 95.5, max: 99.5, ticks: { callback: v => v + '%', color: '#7a8599', font: { size: 10 } },
            grid: { color: 'rgba(30,45,74,0.5)' } },
          x: { ticks: { color: '#7a8599', font: { size: 10 } }, grid: { color: 'rgba(30,45,74,0.5)' } }
        }
      }
    });

    // 5.2 各产品月度对比
    const ctx2 = document.getElementById('productTrendChart').getContext('2d');
    const colors = ['#f87171', '#60a5fa', '#4ade80', '#fb923c', '#a78bfa', '#22d3ee'];
    const datasets2 = prodNames.map((p, idx) => ({
      label: p,
      data: prodYield[p].map(v => +(v * 100).toFixed(2)),
      borderColor: colors[idx % colors.length],
      backgroundColor: 'transparent',
      tension: 0.2,
      pointRadius: 3,
      borderWidth: 2,
      pointHoverRadius: 6,
    }));
    new Chart(ctx2, {
      type: 'line',
      data: { labels: monthly.months, datasets: datasets2 },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: { duration: 1200, easing: 'easeOutQuart' },
        plugins: {
          legend: { position: 'top', labels: { usePointStyle: true, boxWidth: 8, padding: 10, font: { size: 9 } } }
        },
        scales: {
          y: { min: 94, max: 100, ticks: { callback: v => v + '%', color: '#7a8599', font: { size: 10 } },
            grid: { color: 'rgba(30,45,74,0.5)' } },
          x: { ticks: { color: '#7a8599', font: { size: 10 } }, grid: { color: 'rgba(30,45,74,0.5)' } }
        }
      }
    });

    // 5.3 7月各产品炉前良品率 (柱状图)
    const ctx3 = document.getElementById('julyProductChart').getContext('2d');
    const julyYieldArr = prodNames.map(p => calcYield(julyProd[p].good, julyProd[p].bad) * 100);
    const barColors = ['#f87171', '#60a5fa', '#4ade80', '#fb923c', '#a78bfa', '#22d3ee'];
    new Chart(ctx3, {
      type: 'bar',
      data: {
        labels: prodNames,
        datasets: [{
          label: '良品率 (%)',
          data: julyYieldArr.map(v => +v.toFixed(2)),
          backgroundColor: barColors.map(c => c + '66'),
          borderColor: barColors,
          borderWidth: 2,
          borderRadius: 4,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: { duration: 1000, easing: 'easeOutBounce' },
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: (ctx) => '良品率: ' + ctx.parsed.y + '%' } }
        },
        scales: {
          y: { min: 93, max: 100, ticks: { callback: v => v + '%', color: '#7a8599', font: { size: 10 } },
            grid: { color: 'rgba(30,45,74,0.5)' } },
          x: { ticks: { color: '#7a8599', font: { size: 10 } }, grid: { color: 'rgba(30,45,74,0.5)' } }
        }
      }
    });

    // 5.4 工段分布 (饼图) - 带流光插件
    const flowingGlowPlugin = {
      id: 'flowingGlow',
      beforeDraw(chart) {
        if (chart.config.type !== 'doughnut') return;
        const { ctx, chartArea } = chart;
        if (!chartArea) return;
        const centerX = (chartArea.left + chartArea.right) / 2;
        const centerY = (chartArea.top + chartArea.bottom) / 2;
        const radius = Math.min(chartArea.right - chartArea.left, chartArea.bottom - chartArea.top) / 2;
        const time = Date.now() * 0.001;
        const angle = time * 0.3;
        const glowX = centerX + Math.cos(angle) * radius * 0.5;
        const glowY = centerY + Math.sin(angle) * radius * 0.5;
        ctx.save();
        const gradient = ctx.createRadialGradient(glowX, glowY, 0, centerX, centerY, radius);
        gradient.addColorStop(0, 'rgba(6, 182, 212, 0.06)');
        gradient.addColorStop(0.5, 'rgba(59, 130, 246, 0.03)');
        gradient.addColorStop(1, 'rgba(6, 182, 212, 0)');
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    };
    Chart.register(flowingGlowPlugin);

    const ctx4 = document.getElementById('stationChart').getContext('2d');
    const stationLabels = Object.keys(stationBad);
    const stationValues = Object.values(stationBad);
    const stationColors = ['#60a5fa', '#4ade80', '#fb923c', '#f87171', '#a78bfa', '#22d3ee', '#facc15', '#f472b6', '#34d399'];
    new Chart(ctx4, {
      type: 'doughnut',
      data: {
        labels: stationLabels,
        datasets: [{
          data: stationValues,
          backgroundColor: stationColors.slice(0, stationLabels.length),
          borderWidth: 2,
          borderColor: '#0f1729',
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: { duration: 1200, easing: 'easeOutQuart' },
        plugins: {
          legend: { position: 'right', labels: { boxWidth: 12, font: { size: 9 }, color: '#c8d0dc' } }
        }
      }
    });

    // 5.5 TOP失效模式 (横向条形图)
    const ctx5 = document.getElementById('defectChart').getContext('2d');
    const defectLabels = Object.keys(defectBad);
    const defectValues = Object.values(defectBad);
    const defectColors = ['#f87171', '#fb923c', '#facc15', '#60a5fa', '#a78bfa', '#22d3ee', '#4ade80', '#f472b6'];
    new Chart(ctx5, {
      type: 'bar',
      data: {
        labels: defectLabels,
        datasets: [{
          label: '不良数量',
          data: defectValues,
          backgroundColor: defectColors.slice(0, defectLabels.length).map(c => c + '77'),
          borderColor: defectColors.slice(0, defectLabels.length),
          borderWidth: 2,
          borderRadius: 4,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        indexAxis: 'y',
        animation: { duration: 1000, easing: 'easeOutQuart' },
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: (ctx) => ctx.parsed.x + ' 件' } }
        },
        scales: {
          x: { beginAtZero: true, ticks: { color: '#7a8599', font: { size: 10 } }, grid: { color: 'rgba(30,45,74,0.5)' } },
          y: { ticks: { color: '#7a8599', font: { size: 9 } }, grid: { color: 'rgba(30,45,74,0.5)' } }
        }
      }
    });

    // ================================================================
    // 6. 月度明细表格 - 自动滚动 (双份数据实现无缝)
    // ================================================================
    const miniBody = document.getElementById('miniMonthlyBody');
    const miniBodyClone = document.getElementById('miniMonthlyBodyClone');

    function buildTableRows() {
      let html = '';
      for (let i = 0; i < monthly.months.length; i++) {
        const y = monthlyYield[i] * 100;
        const status = y >= 97.5 ? '达标' : '未达标';
        const cls = y >= 97.5 ? 'green' : 'red';
        html += `<tr><td>${monthly.months[i]}</td><td>${y.toFixed(2)}%</td><td><span class="tag ${cls}">${status}</span></td></tr>`;
      }
      return html;
    }
    const rowsHtml = buildTableRows();
    miniBody.innerHTML = rowsHtml;

    // 克隆一份用于无缝滚动
    const cloneHtml = rowsHtml;
    const cloneTr = document.createElement('tbody');
    cloneTr.innerHTML = cloneHtml;
    cloneTr.id = 'miniMonthlyBodyClone';
    // 移除原有的clone如果存在
    const oldClone = document.getElementById('miniMonthlyBodyClone');
    if (oldClone) oldClone.remove();
    const table = document.getElementById('miniMonthlyTable');
    const newClone = document.createElement('tbody');
    newClone.id = 'miniMonthlyBodyClone';
    newClone.innerHTML = cloneHtml;
    table.appendChild(newClone);

    // 滚动速度控制 - 通过CSS animation duration已经设置
    // 悬停暂停功能由CSS控制

    // ================================================================
    // 7. AI建议动态轮换 (每8秒高亮切换)
    // ================================================================
    const suggestionItems = document.querySelectorAll('.right-suggestion-item');
    let suggestionIndex = 0;
    setInterval(() => {
      suggestionItems.forEach((el, idx) => {
        el.style.borderColor = 'var(--border-color)';
        el.style.background = 'rgba(17, 24, 50, 0.5)';
        if (idx === suggestionIndex) {
          el.style.borderColor = 'rgba(6, 182, 212, 0.5)';
          el.style.background = 'rgba(6, 182, 212, 0.08)';
        }
      });
      suggestionIndex = (suggestionIndex + 1) % suggestionItems.length;
    }, 5000);

    // 初始高亮第一个
    if (suggestionItems.length > 0) {
      suggestionItems[0].style.borderColor = 'rgba(6, 182, 212, 0.5)';
      suggestionItems[0].style.background = 'rgba(6, 182, 212, 0.08)';
    }

    // ================================================================
    // 8. 窗口自适应
    // ================================================================
    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        // Chart.js 自动适应
      }, 200);
    });

    console.log('🚀 HEX车间良品率驾驶舱已启动');
    console.log('📊 数据更新至 2026年7月20日');
  </script>
