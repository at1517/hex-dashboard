<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>HEX车间质量看板</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* 全局缩放25% (即缩小为原来的75%) */
        body {
            zoom: 0.75;
            -moz-transform: scale(0.75);
            -moz-transform-origin: top left;
        }
        @-moz-document url-prefix() {
            body {
                zoom: unset;
                transform: scale(0.75);
                transform-origin: top left;
                width: 133.33%;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0a1a2f 0%, #0c2a48 100%);
            font-family: 'Segoe UI', 'Roboto', 'Inter', system-ui, -apple-system, sans-serif;
            padding: 16px 20px;
            color: #eef2ff;
            min-height: 100vh;
        }

        .dashboard-container {
            max-width: 1600px;
            margin: 0 auto;
        }

        /* 头部区域 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: wrap;
            margin-bottom: 20px;
            gap: 12px;
            border-bottom: 2px solid rgba(59,130,246,0.5);
            padding-bottom: 12px;
        }
        .title-section h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #90cdf4);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .title-section p {
            color: #b9d0f0;
            margin-top: 4px;
            font-size: 1rem;
        }
        .date-badge {
            background: rgba(15, 35, 60, 0.7);
            backdrop-filter: blur(4px);
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 500;
            border: 1px solid #2c4f7a;
            color: #cde1ff;
            font-size: 0.95rem;
        }

        /* KPI 卡片 */
        .kpi-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 24px;
        }
        .kpi-card {
            flex: 1 1 220px;
            min-width: 200px;
            background: rgba(12, 30, 55, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 14px 16px;
            border: 1px solid rgba(59,130,246,0.3);
            transition: transform 0.2s;
        }
        .kpi-card:hover {
            transform: translateY(-3px);
            border-color: #3b82f6;
        }
        .kpi-icon {
            font-size: 2rem;
            color: #3b82f6;
            margin-bottom: 8px;
        }
        .kpi-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #9ab9e8;
            text-transform: uppercase;
        }
        .kpi-value {
            font-size: 2.4rem;
            font-weight: 800;
            color: white;
            margin-top: 4px;
            line-height: 1.1;
        }
        .kpi-sub {
            font-size: 0.75rem;
            color: #8aa9cc;
            border-top: 1px dashed #2c4f7a;
            margin-top: 6px;
            padding-top: 5px;
        }

        /* 图表卡片 */
        .chart-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }
        .chart-card {
            background: rgba(10, 25, 45, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 12px 12px 8px;
            border: 1px solid #1e3a5f;
        }
        .chart-card h3 {
            font-weight: 600;
            font-size: 1.3rem;
            margin: 0 0 8px 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #e0edff;
        }
        .chart-container {
            width: 100%;
            height: 340px;
        }
        .full-width {
            grid-column: span 2;
        }

        /* 表格区域 */
        .table-wrapper {
            overflow-x: auto;
            border-radius: 20px;
            background: rgba(8, 22, 40, 0.8);
            padding: 0;
            border: 1px solid #1e3a5f;
            margin-top: 8px;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            color: #e2e8f0;
        }
        .data-table th {
            background: #0b2a44;
            padding: 12px 12px;
            text-align: left;
            font-weight: 600;
            border-bottom: 1px solid #2a4c6e;
            color: #bfd9ff;
            font-size: 0.95rem;
        }
        .data-table td {
            padding: 10px 12px;
            border-bottom: 1px solid #1f3b57;
        }
        .badge-ok {
            background: #0f5c3a;
            color: #b2f0d0;
            padding: 4px 12px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.8rem;
            display: inline-block;
        }
        .badge-warning {
            background: #9b4a1a;
            color: #ffe0b3;
        }
        .footer-note {
            text-align: center;
            margin-top: 20px;
            color: #7e9bc0;
            font-size: 0.8rem;
            border-top: 1px solid #1e3a5f;
            padding-top: 12px;
        }

        @media (max-width: 860px) {
            body {
                padding: 12px;
            }
            .chart-row {
                grid-template-columns: 1fr;
                gap: 16px;
            }
            .full-width {
                grid-column: span 1;
            }
            .kpi-card {
                min-width: 170px;
                padding: 12px 14px;
            }
            .kpi-value {
                font-size: 2rem;
            }
            .chart-container {
                height: 280px;
            }
            .title-section h1 {
                font-size: 1.6rem;
            }
        }

        @media (min-width: 1920px) {
            .kpi-card {
                min-width: 240px;
            }
            .chart-container {
                height: 380px;
            }
        }
    </style>
</head>
<body>
<div class="dashboard-container">
    <div class="header">
        <div class="title-section">
            <h1><i class="fas fa-chart-line" style="color: #3b82f6;"></i> HEX车间 · 质量数据看板</h1>
            <p>2026年3月 AINT量产 SOP RTY 统计 | 工段FTT & 产品良率全景</p>
        </div>
        <div class="date-badge">
            <i class="far fa-calendar-alt"></i> 2026.03.01 - 2026.03.31
        </div>
    </div>

    <!-- KPI 卡片 -->
    <div class="kpi-grid" id="kpiGrid"></div>

    <!-- 双图区 -->
    <div class="chart-row">
        <div class="chart-card">
            <h3><i class="fas fa-industry"></i> 各工段平均FTT%</h3>
            <div id="chart-process" class="chart-container"></div>
        </div>
        <div class="chart-card">
            <h3><i class="fas fa-trophy"></i> 产品RTY TOP5 & 待改善TOP5</h3>
            <div id="chart-rty-top" class="chart-container"></div>
        </div>
    </div>

    <div class="chart-row">
        <div class="chart-card full-width">
            <h3><i class="fas fa-chart-simple"></i> 主要产品类型平均RTY对比</h3>
            <div id="chart-category" class="chart-container" style="height: 320px;"></div>
        </div>
    </div>

    <!-- 核心产品明细表格 -->
    <div class="chart-card" style="padding: 12px 16px;">
        <h3><i class="fas fa-table-list"></i> 核心产品直通率(RTY) & 关键工段FTT明细</h3>
        <div class="table-wrapper">
            <table class="data-table" id="product-table">
                <thead>
                    <tr><th>产品名称</th><th>产品类型</th><th>整体RTY</th><th>炉前FTT</th><th>钎焊FTT</th><th>氦检FTT</th><th>预检/超声波FTT</th></tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
        <div class="footer-note">
            <i class="fas fa-database"></i> 数据源自BASE表 & RTY汇总
        </div>
    </div>
</div>

<script>
    // ======================= 核心数据 =======================
    const productsData = [
        { name: "Silver内冷VAVE", type: "内冷", furnace: 0.998988, braze: 0.997428, preCheck: 0.996348, ultrasonic: 0.998856, hydro: 0.998932, rty: 0.988797 },
        { name: "ES6冷凝器", type: "冷凝器", furnace: 0.987805, spot: 1.0, braze: 0.986667, helium: 0.892857, rty: 0.870209 },
        { name: "BX11冷凝器", type: "冷凝器", furnace: 0.989533, spot: 0.970131, braze: 0.956761, helium: 0.986509, rty: 0.906077 },
        { name: "SX11冷凝器", type: "冷凝器", furnace: 0.991587, spot: 0.973735, braze: 0.983902, helium: 0.988899, rty: 0.939453 },
        { name: "X01冷凝器", type: "冷凝器", furnace: 0.998477, spot: 0.944573, braze: 0.976039, helium: 0.954001, rty: 0.878192 },
        { name: "Aarch暖风", type: "暖风", furnace: 1.0, braze: 0.998092, preCheck: 0.989354, rty: 0.987466 },
        { name: "L663暖风", type: "暖风", furnace: 0.996611, braze: 0.992467, helium: 0.973584, rty: 0.962975 },
        { name: "MQB暖风", type: "暖风", furnace: 0.998811, braze: 0.973714, helium: 0.990436, rty: 0.963255 },
        { name: "KX11暖风", type: "暖风", furnace: 0.992854, braze: 0.99834, flame: 0.992373, preCheck: 0.996479, helium: 0.996889, rty: 0.977133 },
        { name: "BX11蒸发器", type: "蒸发器", furnace: 0.998229, braze: 0.995273, preCheck: 0.997478, ultrasonic: 0.99712, hydro: 0.999637, rty: 0.987792 },
        { name: "KX11蒸发器", type: "蒸发器", furnace: 0.998497, braze: 0.995663, preCheck: 0.996047, ultrasonic: 0.999563, hydro: 0.999587, helium: 0.998167, rty: 0.987581 },
        { name: "Silver蒸发器(MY VAVE)", type: "蒸发器", furnace: 0.99953, braze: 0.993708, preCheck: 0.995314, ultrasonic: 0.999184, hydro: 0.999566, flame: 0.998762, helium: 0.996992, rty: 0.983163 },
        { name: "A+前暖风", type: "暖风", furnace: 0.997729, braze: 0.991369, preCheck: 0.964854, helium: 0.997647, rty: 0.952108 },
        { name: "D01水箱", type: "水箱", furnace: 0.991771, braze: 0.988359, dryTest: 0.993662, rty: 0.974014 },
        { name: "RU-TOC油冷器", type: "油冷器", furnace: 0.996261, spot: 1.0, braze: 0.979807, preCheck: 0.989493, rty: 0.965888 },
        { name: "GME-TOC(带阀)", type: "油冷器", furnace: 0.994039, spot: 1.0, braze: 0.960074, preCheck: 0.959253, rty: 0.915464 },
        { name: "ES8冷却模块", type: "冷却模块", helium: 1.0, assembly: 1.0, rty: 1.0 },
        { name: "MS11内冷", type: "内冷", furnace: 0.998633, braze: 0.987486, preCheck: 0.998462, hydro: 0.999537, rty: 0.984163 }
    ];

    // 工段平均FTT
    const processMap = { "炉前": [], "钎焊": [], "氦检": [], "预检": [], "点焊": [], "超声波": [], "火焰焊长管": [], "亲水湿度检": [] };
    productsData.forEach(p => {
        if (p.furnace !== undefined) processMap["炉前"].push(p.furnace);
        if (p.braze !== undefined) processMap["钎焊"].push(p.braze);
        if (p.helium !== undefined) processMap["氦检"].push(p.helium);
        if (p.preCheck !== undefined) processMap["预检"].push(p.preCheck);
        if (p.spot !== undefined) processMap["点焊"].push(p.spot);
        if (p.ultrasonic !== undefined) processMap["超声波"].push(p.ultrasonic);
        if (p.flame !== undefined) processMap["火焰焊长管"].push(p.flame);
        if (p.hydro !== undefined) processMap["亲水湿度检"].push(p.hydro);
    });
    const processAvg = {};
    for (let [key, arr] of Object.entries(processMap)) {
        processAvg[key] = arr.length ? (arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(4) : 0;
    }

    // 产品类型平均RTY
    const typeRTY = {};
    productsData.forEach(p => { if(p.rty) { if(!typeRTY[p.type]) typeRTY[p.type]=[]; typeRTY[p.type].push(p.rty); } });
    const typeAvg = Object.keys(typeRTY).map(t => ({ name: t, avgRTY: (typeRTY[t].reduce((a,b)=>a+b,0)/typeRTY[t].length).toFixed(4) }));

    // KPI
    const validRty = productsData.filter(p => p.rty !== undefined).map(p => p.rty);
    const avgOverallRTY = (validRty.reduce((a,b)=>a+b,0)/validRty.length).toFixed(4);
    const totalProducts = productsData.length;
    const totalCompleted = 245800;
    const totalDefects = 9860;

    const kpis = [
        { label: "整体平均RTY", value: `${(avgOverallRTY * 100).toFixed(2)}%`, icon: "fas fa-chart-pie", sub: "综合直通率" },
        { label: "监控产品数", value: totalProducts, icon: "fas fa-cubes", sub: "核心产品型号" },
        { label: "总完工产量", value: totalCompleted.toLocaleString(), icon: "fas fa-check-circle", sub: "3月入库总数(约)" },
        { label: "总不良数", value: totalDefects.toLocaleString(), icon: "fas fa-exclamation-triangle", sub: "各工段不良合计" }
    ];
    const kpiContainer = document.getElementById('kpiGrid');
    kpis.forEach(k => {
        const card = document.createElement('div'); card.className = 'kpi-card';
        card.innerHTML = `<div class="kpi-icon"><i class="${k.icon}"></i></div><div class="kpi-label">${k.label}</div><div class="kpi-value">${k.value}</div><div class="kpi-sub">${k.sub}</div>`;
        kpiContainer.appendChild(card);
    });

    // 图表渲染
    const processChart = echarts.init(document.getElementById('chart-process'));
    processChart.setOption({
        backgroundColor: 'transparent',
        tooltip: { trigger: 'axis', formatter: '{b}: {c}%', axisPointer: { type: 'shadow' } },
        grid: { containLabel: true, borderWidth: 0, top: 20, bottom: 10, left: 40, right: 20 },
        xAxis: { type: 'category', data: Object.keys(processAvg), axisLabel: { rotate: 30, color: '#b9d0f0', fontSize: 11 }, axisLine: { lineStyle: { color: '#2c4f7a' } } },
        yAxis: { type: 'value', name: 'FTT (%)', nameTextStyle: { color: '#b9d0f0' }, min: 85, max: 100, axisLabel: { formatter: '{value}%', color: '#b9d0f0' }, splitLine: { lineStyle: { color: '#1e3a5f' } } },
        series: [{ type: 'bar', data: Object.values(processAvg).map(v => (parseFloat(v)*100).toFixed(1)), itemStyle: { color: '#3b82f6', borderRadius: [8,8,0,0] }, label: { show: true, position: 'top', formatter: '{c}%', color: '#e0edff' } }]
    });

    const sorted = [...productsData].filter(p=>p.rty).sort((a,b)=>b.rty-a.rty);
    const top5 = sorted.slice(0,5);
    const bottom5 = sorted.slice(-5).reverse();
    const topNames = top5.map(p=>p.name.length>14?p.name.slice(0,12)+'..':p.name);
    const topRates = top5.map(p=>(p.rty*100).toFixed(1));
    const bottomNames = bottom5.map(p=>p.name.length>14?p.name.slice(0,12)+'..':p.name);
    const bottomRates = bottom5.map(p=>(p.rty*100).toFixed(1));
    const rtyChart = echarts.init(document.getElementById('chart-rty-top'));
    rtyChart.setOption({
        backgroundColor: 'transparent',
        tooltip: { trigger: 'axis', formatter: '{b}: {c}%' },
        legend: { data: ['优秀产品RTY', '待改善产品RTY'], textStyle: { color: '#e0edff' }, itemWidth: 25, itemHeight: 12 },
        grid: { containLabel: true, left: '12%', top: 20, bottom: 10 },
        xAxis: { type: 'value', name: '直通率 (%)', min: 70, max: 100, axisLabel: { formatter: '{value}%', color: '#b9d0f0' }, splitLine: { lineStyle: { color: '#1e3a5f' } } },
        yAxis: { type: 'category', data: [...topNames, ...bottomNames], axisLabel: { color: '#e0edff', fontSize: 11 }, axisLine: { lineStyle: { color: '#2c4f7a' } } },
        series: [
            { name: '优秀产品RTY', type: 'bar', data: [...topRates, ...Array(bottomNames.length).fill(null)], itemStyle: { color: '#10b981', borderRadius: [0,6,6,0] }, label: { show: true, position: 'right', formatter: '{c}%', color: '#c0f0d0' } },
            { name: '待改善产品RTY', type: 'bar', data: [...Array(topNames.length).fill(null), ...bottomRates], itemStyle: { color: '#f97316', borderRadius: [0,6,6,0] }, label: { show: true, position: 'right', formatter: '{c}%', color: '#ffd9b0' } }
        ]
    });

    const catChart = echarts.init(document.getElementById('chart-category'));
    catChart.setOption({
        backgroundColor: 'transparent',
        tooltip: { trigger: 'axis', formatter: '{b}: {c}%' },
        grid: { containLabel: true, top: 20, bottom: 10, left: 50, right: 20 },
        xAxis: { type: 'category', data: typeAvg.map(t=>t.name), axisLabel: { rotate: 20, color: '#b9d0f0', fontSize: 12 }, axisLine: { lineStyle: { color: '#2c4f7a' } } },
        yAxis: { type: 'value', name: '平均RTY (%)', min: 88, max: 100, axisLabel: { formatter: '{value}%', color: '#b9d0f0' }, splitLine: { lineStyle: { color: '#1e3a5f' } } },
        series: [{ type: 'bar', data: typeAvg.map(t=>(parseFloat(t.avgRTY)*100).toFixed(1)), itemStyle: { color: '#8b5cf6', borderRadius: [8,8,0,0] }, label: { show: true, position: 'top', formatter: '{c}%', color: '#e0edff' } }]
    });

    // 表格填充
    const tbody = document.getElementById('table-body');
    productsData.filter(p=>p.rty).slice(0,14).forEach(p => {
        const row = tbody.insertRow();
        const furnaceVal = p.furnace ? (p.furnace*100).toFixed(1)+'%' : '—';
        const brazeVal = p.braze ? (p.braze*100).toFixed(1)+'%' : '—';
        const heliumVal = p.helium ? (p.helium*100).toFixed(1)+'%' : '—';
        const preVal = p.preCheck ? (p.preCheck*100).toFixed(1)+'%' : (p.ultrasonic ? (p.ultrasonic*100).toFixed(1)+'%' : '—');
        const rtyPercent = (p.rty*100).toFixed(2)+'%';
        const badgeClass = p.rty < 0.92 ? 'badge-warning' : 'badge-ok';
        row.innerHTML = `<td style="font-weight:600;">${p.name}</td><td>${p.type}</td><td><span class="${badgeClass}">${rtyPercent}</span></td><td>${furnaceVal}</td><td>${brazeVal}</td><td>${heliumVal}</td><td>${preVal}</td>`;
    });

    // ======================= 自动慢速循环滚动 =======================
    let scrollFrameId = null;
    let isAutoScrolling = true;
    const SCROLL_SPEED = 0.6;

    function startAutoScroll() {
        if (scrollFrameId) cancelAnimationFrame(scrollFrameId);
        const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
        if (maxScroll <= 0) return;
        function step() {
            if (!isAutoScrolling) return;
            let currentScroll = window.scrollY;
            let nextScroll = currentScroll + SCROLL_SPEED;
            if (nextScroll >= maxScroll) {
                window.scrollTo(0, 0);
                scrollFrameId = requestAnimationFrame(step);
                return;
            }
            window.scrollTo(0, nextScroll);
            scrollFrameId = requestAnimationFrame(step);
        }
        scrollFrameId = requestAnimationFrame(step);
    }

    window.addEventListener('load', () => { setTimeout(startAutoScroll, 1000); });

    let userInteractTimer = null;
    function pauseAutoScrollTemporarily() {
        if (!isAutoScrolling) return;
        isAutoScrolling = false;
        if (scrollFrameId) cancelAnimationFrame(scrollFrameId);
        if (userInteractTimer) clearTimeout(userInteractTimer);
        userInteractTimer = setTimeout(() => {
            isAutoScrolling = true;
            startAutoScroll();
        }, 3000);
    }
    window.addEventListener('wheel', () => pauseAutoScrollTemporarily());
    window.addEventListener('touchstart', () => pauseAutoScrollTemporarily());

    let resizeTimer = null;
    window.addEventListener('resize', () => {
        if (resizeTimer) clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => {
            if (scrollFrameId) cancelAnimationFrame(scrollFrameId);
            isAutoScrolling = true;
            startAutoScroll();
            processChart.resize();
            rtyChart.resize();
            catChart.resize();
        }, 300);
    });

    // 每10分钟自动刷新
    setInterval(() => { location.reload(); }, 10 * 60 * 1000);
</script>
</body>
</html>
